name: check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - stable
          - oldstable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Check gofmt
        run: test -z "$(gofmt -l .)"
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
      - name: Test
        run: go test -race -count=1 ./...

  grpc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - stable
          - oldstable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: grpc/go.sum
      - name: Check gofmt
        working-directory: grpc
        run: test -z "$(gofmt -l .)"
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          working-directory: grpc
      - name: Test
        working-directory: grpc
        run: go test -race -count=1 ./...

  examples:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - examples/nethttp
          - examples/enqueue
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
      - name: Check gofmt
        working-directory: ${{ matrix.module }}
        run: test -z "$(gofmt -l .)"
      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          working-directory: ${{ matrix.module }}
      - name: Smoke run
        # Each example is a self-terminating demo that must report at least
        # one violation; build-only would miss runtime regressions.
        working-directory: ${{ matrix.module }}
        run: go run . 2>&1 | tee /tmp/smoke.out && grep -q "side effect inside an open transaction" /tmp/smoke.out

  e2e:
    # Exercises the detector through a real pgx v5 driver against a throwaway
    # PostgreSQL. Unlike go-txnproof there is no server-log cross-check (the
    # property is client-side timing), so no version matrix is needed — one
    # stable major suffices; run.sh initdbs a socket-only cluster (no Docker).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache-dependency-path: e2e/go.sum
      - name: Install PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y --no-install-recommends postgresql-17
      - name: Check gofmt
        working-directory: e2e
        run: test -z "$(gofmt -l .)"
      - name: Lint
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: latest
          working-directory: e2e
      - name: Run e2e tests against a throwaway PostgreSQL cluster
        # run.sh prefers binaries on PATH, so prepend the installed version's.
        run: PATH="/usr/lib/postgresql/17/bin:$PATH" ./e2e/run.sh -v
